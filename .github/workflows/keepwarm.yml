name: Keep backend warm

# Render's free tier sleeps the service after ~15 minutes of inactivity, which
# causes a slow cold start (and a transient 502) on the next request. This pings
# the health endpoint on a schedule so the backend stays awake for demos.
#
# Note: GitHub scheduled workflows are best-effort and can be delayed by a few
# minutes; for hard guarantees use an external uptime monitor (UptimeRobot,
# cron-job.org) hitting the same URL every 10 minutes.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://engram-backend-kknh.onrender.com/health || echo "000")
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 15
          done
          echo "backend did not return 200 after retries (it may be waking up)"
